services:
  - type: web
    name: ai-math-doubt-solver-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8080
      - key: CORS_ORIGIN
        value: https://your-frontend.vercel.app
      # Set one (or both) of these in Render dashboard as secrets:
      # - OPENAI_API_KEY
      # - GEMINI_API_KEY
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: GEMINI_MODEL
        value: gemini-1.5-flash

